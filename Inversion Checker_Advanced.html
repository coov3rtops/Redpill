<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inversion Checker - Imperial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .risk-high { background: linear-gradient(135deg, #f59e0b, #dc2626); }
    .risk-med  { background: #d97706; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-lg mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6 text-amber-400">🌡️ Inversion Checker (Imperial)</h1>

    <div class="bg-zinc-900 rounded-2xl p-6 shadow-xl">
      <div class="flex gap-2 mb-6">
        <input id="locationInput" type="text" placeholder="Zip code or lat,lon (e.g. 43021 or 40.7,-82.5)" 
               class="flex-1 bg-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400">
        <button onclick="checkLocation()" 
                class="bg-amber-500 hover:bg-amber-600 px-6 py-3 rounded-xl font-medium">Check</button>
      </div>

      <div id="status" class="text-center text-sm text-amber-400 mb-4 min-h-[1.25rem]"></div>

      <div id="current" class="mb-8"></div>
      <div id="forecast" class="space-y-3"></div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-8">
      Enhanced Scoring • Open-Meteo • Imperial Units
    </div>
  </div>

  <script>
    const DEFAULT_LAT = 40.6;
    const DEFAULT_LON = -82.5;

    function cToF(c) { return (c * 9/5 + 32).toFixed(1); }
    function kmhToMph(kmh) { return (kmh * 0.621371).toFixed(1); }

    async function getCoords(input) {
      if (!input) return [DEFAULT_LAT, DEFAULT_LON];

      if (input.includes(',')) {
        const parts = input.split(',').map(x => parseFloat(x.trim()));
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          return parts;
        }
      }

      // Zip code
      try {
        document.getElementById('status').innerHTML = `🔍 Looking up zip code ${input}...`;
        const res = await fetch(`https://api.zippopotam.us/us/${input.trim()}`);
        if (!res.ok) throw new Error('Zip not found');
        const data = await res.json();
        const place = data.places[0];
        document.getElementById('status').innerHTML = `✅ ${place['place name']}, ${place['state']}`;
        return [parseFloat(place.latitude), parseFloat(place.longitude)];
      } catch (e) {
        document.getElementById('status').innerHTML = `⚠️ Zip code not found — using Mansfield, OH`;
        return [DEFAULT_LAT, DEFAULT_LON];
      }
    }

    function calculateInversionScore(data, isCurrent = true) {
      let score = 0;
      let cloud, windKmh, tempC, dewC, rh, pressure;

      if (isCurrent && data.current) {
        const c = data.current;
        cloud = c.cloud_cover;
        windKmh = c.wind_speed_10m;
        tempC = c.temperature_2m;
        dewC = c.dew_point_2m;
        rh = c.relative_humidity_2m;
        pressure = c.pressure_msl || 1013;
      } else {
        const h = data.hourly;
        cloud = h.cloud_cover[0];
        windKmh = h.wind_speed_10m[0];
        tempC = h.temperature_2m[0];
        dewC = h.dew_point_2m[0];
        rh = h.relative_humidity_2m[0];
        pressure = h.pressure_msl ? h.pressure_msl[0] : 1013;
      }

      const depC = tempC - dewC;

      if (cloud < 20) score += 30; else if (cloud < 35) score += 20;
      if (windKmh < 5) score += 25; else if (windKmh < 8) score += 15;
      if (depC > 12) score += 20; else if (depC > 8) score += 12;
      if (pressure > 1020) score += 15; else if (pressure > 1013) score += 8;
      if (rh < 60) score += 10;

      return Math.min(100, Math.round(score));
    }

    async function checkWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                  `&hourly=cloud_cover,wind_speed_10m,temperature_2m,dew_point_2m,relative_humidity_2m,pressure_msl` +
                  `&current=temperature_2m,dew_point_2m,relative_humidity_2m,wind_speed_10m,cloud_cover,pressure_msl` +
                  `&timezone=auto&forecast_days=2`;

      try {
        document.getElementById('status').innerHTML = '🌤️ Loading weather data...';
        const res = await fetch(url);
        if (!res.ok) throw new Error('Weather fetch failed');
        const data = await res.json();

        const c = data.current;
        const score = calculateInversionScore(data, true);
        const tempF = cToF(c.temperature_2m);
        const dewF = cToF(c.dew_point_2m);
        const windMph = kmhToMph(c.wind_speed_10m);

        let riskHTML = '';
        if (score >= 75) riskHTML = `<div class="risk-high text-white text-center py-4 mt-5 rounded-xl font-bold text-lg">✅ STRONG INVERSION (Score: ${score})</div>`;
        else if (score >= 60) riskHTML = `<div class="risk-med text-white text-center py-4 mt-5 rounded-xl font-bold">⚠️ MODERATE RISK (Score: ${score})</div>`;
        else riskHTML = `<div class="text-green-400 text-center py-4 mt-5">→ Low risk (Score: ${score})</div>`;

        document.getElementById('current').innerHTML = `
          <div class="bg-zinc-800 rounded-2xl p-5">
            <div class="text-sm text-zinc-400 mb-1">CURRENT CONDITIONS</div>
            <div class="text-5xl font-bold">${tempF}°F</div>
            <div class="grid grid-cols-2 gap-4 mt-5 text-sm">
              <div>Dew Point: ${dewF}°F</div>
              <div>RH: ${c.relative_humidity_2m}%</div>
              <div>Wind: ${windMph} mph</div>
              <div>Clouds: ${c.cloud_cover}%</div>
              <div>Pressure: ${c.pressure_msl.toFixed(0)} hPa</div>
            </div>
            ${riskHTML}
          </div>`;

        // Forecast (simplified)
        let html = `<div class="text-sm text-zinc-400 mb-3">FORECASTED HIGH RISK PERIODS</div>`;
        let found = 0;

        for (let i = 0; i < data.hourly.time.length; i++) {
          const hour = parseInt(data.hourly.time[i].slice(11,13));
          if (!(hour >= 15 || hour <= 9)) continue;

          const hData = { current: {
            cloud_cover: data.hourly.cloud_cover[i],
            wind_speed_10m: data.hourly.wind_speed_10m[i],
            temperature_2m: data.hourly.temperature_2m[i],
            dew_point_2m: data.hourly.dew_point_2m[i],
            relative_humidity_2m: data.hourly.relative_humidity_2m[i],
            pressure_msl: data.hourly.pressure_msl[i]
          }};

          const hScore = calculateInversionScore(hData, true);
          if (hScore >= 65) {
            found++;
            const timeStr = new Date(data.hourly.time[i]).toLocaleString('en-US', {weekday:'short', hour:'numeric', minute:'2-digit'});
            const hTempF = cToF(data.hourly.temperature_2m[i]);
            const hWind = kmhToMph(data.hourly.wind_speed_10m[i]);
            html += `<div class="bg-zinc-800 rounded-xl p-4 flex justify-between">
              <div>${timeStr}</div>
              <div class="text-amber-400">${hTempF}°F • ${hWind} mph (${hScore})</div>
            </div>`;
          }
        }

        if (found === 0) html += `<div class="text-zinc-400 italic text-center py-10">No strong inversion periods forecasted</div>`;

        document.getElementById('forecast').innerHTML = html;
        document.getElementById('status').innerHTML = '';

      } catch (e) {
        console.error(e);
        document.getElementById('status').innerHTML = '❌ Failed to load weather. Check internet connection.';
      }
    }

    async function checkLocation() {
      const input = document.getElementById('locationInput').value.trim();
      if (!input) {
        document.getElementById('status').innerHTML = 'Please enter a zip code or coordinates';
        return;
      }
      const [lat, lon] = await getCoords(input);
      await checkWeather(lat, lon);
    }

    // Auto refresh default location
    setInterval(() => checkWeather(DEFAULT_LAT, DEFAULT_LON), 60000);

    // Load default on start
    window.onload = () => checkWeather(DEFAULT_LAT, DEFAULT_LON);
  </script>
</body>
</html>
