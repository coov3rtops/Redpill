<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inversion Checker - Imperial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; }
    .risk-high { background: linear-gradient(135deg, #f59e0b, #dc2626); }
    .risk-med  { background: #d97706; }
    #map { height: 380px; border-radius: 16px; background: #1f2937; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6 text-amber-400">🌡️ Inversion Checker (Imperial)</h1>

    <div class="bg-zinc-900 rounded-2xl p-6 shadow-xl">
      <div class="flex gap-2 mb-6">
        <input id="locationInput" type="text" placeholder="Zip code or lat,lon" 
               class="flex-1 bg-zinc-800 text-white px-4 py-3 rounded-xl">
        <button onclick="checkLocation()" 
                class="bg-amber-500 hover:bg-amber-600 px-6 py-3 rounded-xl font-medium">Check</button>
      </div>

      <div id="status" class="text-center text-sm text-amber-400 mb-4 min-h-[1.5rem]"></div>

      <div class="mb-6">
        <div class="text-sm text-zinc-400 mb-2">🗺️ Click on the map to pick a location</div>
        <div id="map"></div>
        <button onclick="useSelectedLocation()" 
                class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-medium">
          ✅ Use Selected Location
        </button>
      </div>

      <div id="current" class="mb-8"></div>
      <div id="forecast" class="space-y-3"></div>
    </div>
  </div>

  <script>
    let selectedLat = 40.6;
    let selectedLon = -82.5;
    let map = null;
    let marker = null;

    function cToF(c) { return (c * 9/5 + 32).toFixed(1); }
    function kmhToMph(kmh) { return (kmh * 0.621371).toFixed(1); }

    function initMap() {
      map = L.map('map').setView([39.8, -98.5], 4);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19
      }).addTo(map);

      map.on('click', function(e) {
        selectedLat = e.latlng.lat;
        selectedLon = e.latlng.lng;
        if (marker) marker.remove();
        marker = L.marker([selectedLat, selectedLon]).addTo(map)
          .bindPopup(`Selected: ${selectedLat.toFixed(4)}, ${selectedLon.toFixed(4)}`).openPopup();
      });

      marker = L.marker([40.6, -82.5]).addTo(map);
    }

    async function getCoords(input) {
      if (!input) return [40.6, -82.5];
      if (input.includes(',')) return input.split(',').map(x => parseFloat(x.trim()));
      
      try {
        document.getElementById('status').innerHTML = `🔍 Looking up ${input}...`;
        const res = await fetch(`https://api.zippopotam.us/us/${input.trim()}`);
        const data = await res.json();
        const p = data.places[0];
        document.getElementById('status').innerHTML = `✅ ${p['place name']}, ${p['state']}`;
        return [parseFloat(p.latitude), parseFloat(p.longitude)];
      } catch {
        document.getElementById('status').innerHTML = `⚠️ Using default Mansfield, OH`;
        return [40.6, -82.5];
      }
    }

    function calculateInversionScore(data, isCurrent = true) {
      let score = 0;
      let cloud, windKmh, tempC, dewC, rh, pressure;

      if (isCurrent && data.current) {
        const c = data.current;
        cloud = c.cloud_cover; windKmh = c.wind_speed_10m; tempC = c.temperature_2m;
        dewC = c.dew_point_2m; rh = c.relative_humidity_2m; pressure = c.pressure_msl || 1013;
      } else {
        const h = data.hourly;
        cloud = h.cloud_cover[0]; windKmh = h.wind_speed_10m[0]; tempC = h.temperature_2m[0];
        dewC = h.dew_point_2m[0]; rh = h.relative_humidity_2m[0]; pressure = h.pressure_msl ? h.pressure_msl[0] : 1013;
      }

      const depC = tempC - dewC;
      if (cloud < 20) score += 30; else if (cloud < 35) score += 20;
      if (windKmh < 5) score += 25; else if (windKmh < 8) score += 15;
      if (depC > 12) score += 20; else if (depC > 8) score += 12;
      if (pressure > 1020) score += 15; else if (pressure > 1013) score += 8;
      if (rh < 60) score += 10;

      return Math.min(100, Math.round(score));
    }

    async function checkWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                  `&hourly=cloud_cover,wind_speed_10m,temperature_2m,dew_point_2m,relative_humidity_2m,pressure_msl` +
                  `&current=temperature_2m,dew_point_2m,relative_humidity_2m,wind_speed_10m,cloud_cover,pressure_msl` +
                  `&timezone=auto&forecast_days=2`;

      try {
        document.getElementById('status').innerHTML = '🌤️ Loading weather data...';
        const res = await fetch(url);
        const data = await res.json();

        const c = data.current;
        const score = calculateInversionScore(data, true);
        const tempF = cToF(c.temperature_2m);
        const dewF = cToF(c.dew_point_2m);
        const windMph = kmhToMph(c.wind_speed_10m);

        let riskHTML = score >= 75 ? 
          `<div class="risk-high text-white text-center py-4 mt-5 rounded-xl font-bold text-lg">✅ STRONG INVERSION (Score: ${score})</div>` :
          score >= 60 ? 
          `<div class="risk-med text-white text-center py-4 mt-5 rounded-xl font-bold">⚠️ MODERATE RISK (Score: ${score})</div>` :
          `<div class="text-green-400 text-center py-4 mt-5">→ Low risk (Score: ${score})</div>`;

        document.getElementById('current').innerHTML = `
          <div class="bg-zinc-800 rounded-2xl p-5">
            <div class="text-sm text-zinc-400 mb-1">CURRENT CONDITIONS</div>
            <div class="text-5xl font-bold">${tempF}°F</div>
            <div class="grid grid-cols-2 gap-4 mt-5 text-sm">
              <div>Dew: ${dewF}°F</div><div>RH: ${c.relative_humidity_2m}%</div>
              <div>Wind: ${windMph} mph</div><div>Clouds: ${c.cloud_cover}%</div>
              <div>Pressure: ${c.pressure_msl.toFixed(0)} hPa</div>
            </div>
            ${riskHTML}
          </div>`;

        let html = `<div class="text-sm text-zinc-400 mb-3">FORECASTED HIGH RISK PERIODS</div>`;
        let found = 0;
        for (let i = 0; i < data.hourly.time.length; i++) {
          const hour = parseInt(data.hourly.time[i].slice(11,13));
          if (!(hour >= 15 || hour <= 9)) continue;
          const hScore = calculateInversionScore({current: {
            cloud_cover: data.hourly.cloud_cover[i],
            wind_speed_10m: data.hourly.wind_speed_10m[i],
            temperature_2m: data.hourly.temperature_2m[i],
            dew_point_2m: data.hourly.dew_point_2m[i],
            relative_humidity_2m: data.hourly.relative_humidity_2m[i],
            pressure_msl: data.hourly.pressure_msl[i]
          }}, true);
          if (hScore >= 65) {
            found++;
            const timeStr = new Date(data.hourly.time[i]).toLocaleString('en-US', {weekday:'short', hour:'numeric', minute:'2-digit'});
            html += `<div class="bg-zinc-800 rounded-xl p-4 flex justify-between">
              <div>${timeStr}</div>
              <div class="text-amber-400">${cToF(data.hourly.temperature_2m[i])}°F • ${kmhToMph(data.hourly.wind_speed_10m[i])} mph (${hScore})</div>
            </div>`;
          }
        }
        if (found === 0) html += `<div class="text-zinc-400 italic text-center py-10">No strong inversion periods forecasted</div>`;
        document.getElementById('forecast').innerHTML = html;
        document.getElementById('status').innerHTML = '';
      } catch (e) {
        console.error(e);
        document.getElementById('status').innerHTML = '❌ Failed to load weather data';
      }
    }

    function useSelectedLocation() {
      checkWeather(selectedLat, selectedLon);
    }

    async function checkLocation() {
      const input = document.getElementById('locationInput').value.trim();
      const [lat, lon] = await getCoords(input);
      selectedLat = lat;
      selectedLon = lon;
      checkWeather(lat, lon);
    }

    setInterval(() => checkWeather(40.6, -82.5), 60000);

    window.onload = function() {
      initMap();
      checkWeather(40.6, -82.5);   // Force default load
    };
  </script>
</body>
</html>
