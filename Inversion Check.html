<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inversion Checker - Mansfield, OH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; }
    .risk-high { background: linear-gradient(135deg, #f59e0b, #dc2626); }
    .risk-med  { background: #d97706; }
    #map { height: 380px; border-radius: 16px; background: #1f2937; }
    .fog-type { border-left: 5px solid #22d3ee; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6 text-amber-400">🌡️ Inversion Checker (Mansfield, OH)</h1>

    <div class="bg-zinc-900 rounded-2xl p-6 shadow-xl">
      <div class="flex gap-2 mb-6">
        <input id="locationInput" type="text" placeholder="Zip code or lat,lon" 
               class="flex-1 bg-zinc-800 text-white px-4 py-3 rounded-xl">
        <button onclick="checkLocation()" 
                class="bg-amber-500 hover:bg-amber-600 px-6 py-3 rounded-xl font-medium">Check</button>
      </div>

      <div id="status" class="text-center text-sm text-amber-400 mb-4 min-h-[1.5rem]"></div>

      <div class="mb-6">
        <div class="text-sm text-zinc-400 mb-2">🗺️ Click on the map to pick a location</div>
        <div id="map"></div>
        <button onclick="useSelectedLocation()" 
                class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-medium">
          ✅ Use Selected Location
        </button>
      </div>

      <div id="current" class="mb-8"></div>
      <div id="forecast" class="space-y-3"></div>
    </div>
  </div>

  <script>
    let selectedLat = 40.6;
    let selectedLon = -82.5;
    let map = null;
    let marker = null;

    function cToF(c) { return (c * 9/5 + 32).toFixed(1); }
    function kmhToMph(kmh) { return (kmh * 0.621371).toFixed(1); }

    function initMap() {
      map = L.map('map').setView([40.6, -82.5], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19
      }).addTo(map);

      map.on('click', function(e) {
        selectedLat = e.latlng.lat;
        selectedLon = e.latlng.lng;
        if (marker) marker.remove();
        marker = L.marker([selectedLat, selectedLon]).addTo(map)
          .bindPopup(`Selected: ${selectedLat.toFixed(4)}, ${selectedLon.toFixed(4)}`).openPopup();
      });

      marker = L.marker([40.6, -82.5]).addTo(map);
    }

    async function getCoords(input) {
      if (!input) return [40.6, -82.5];
      if (input.includes(',')) return input.split(',').map(x => parseFloat(x.trim()));
      
      try {
        document.getElementById('status').innerHTML = `🔍 Looking up ${input}...`;
        const res = await fetch(`https://api.zippopotam.us/us/${input.trim()}`);
        const data = await res.json();
        const p = data.places[0];
        document.getElementById('status').innerHTML = `✅ ${p['place name']}, ${p['state']}`;
        return [parseFloat(p.latitude), parseFloat(p.longitude)];
      } catch {
        document.getElementById('status').innerHTML = `⚠️ Using default Mansfield, OH`;
        return [40.6, -82.5];
      }
    }

    // Updated inversion logic with dB boost (matched to Python version)
    function getInversionRisk(c, hour, isCurrent = false) {
      const dep = c.temperature_2m - c.dew_point_2m;
      const rh = c.relative_humidity_2m;
      const cloud = c.cloud_cover;
      const wind = c.wind_speed_10m;

      const isFogLikely = (rh >= 85 && dep <= 3.5) || cloud >= 80;
      const isMorning = hour <= 10 || hour >= 19;

      let boost = 0;

      // Classic dry radiation inversion
      if (cloud < 35 && wind < 10 && dep > 8 && rh < 65) {
        boost = Math.min(20, 4 + (500 / 500) * 6); // ~500m reference
        return { 
          level: "high", 
          type: "Classic Radiation", 
          score: 95, 
          message: "STRONG CLEAR-SKY INVERSION", 
          boost: boost.toFixed(1)
        };
      }

      // Moist / Fog type
      let windLimit = isMorning ? 13 : 10;
      if (wind < windLimit && isFogLikely) {
        const type = isMorning ? "Moist/Fog (Morning)" : "Moist/Fog";
        boost = Math.min(15, 3 + (500 / 500) * 5);
        return { 
          level: "high", 
          type: type, 
          score: 88, 
          message: "MOIST/FOG INVERSION - Low-freq noise likely amplified", 
          boost: boost.toFixed(1)
        };
      }

      // Low risk
      boost = wind > 5 ? 0 : 2;
      return { 
        level: "low", 
        type: "None", 
        score: 35, 
        message: "Low inversion risk", 
        boost: boost.toFixed(1)
      };
    }

    async function checkWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                  `&hourly=cloud_cover,wind_speed_10m,temperature_2m,dew_point_2m,relative_humidity_2m,pressure_msl` +
                  `&current=temperature_2m,dew_point_2m,relative_humidity_2m,wind_speed_10m,cloud_cover,pressure_msl` +
                  `&timezone=auto&forecast_days=2`;

      try {
        document.getElementById('status').innerHTML = '🌤️ Loading weather data...';
        const res = await fetch(url);
        const data = await res.json();

        const c = data.current;
        const now = new Date();
        const currentHour = now.getHours();
        const risk = getInversionRisk(c, currentHour, true);

        const tempF = cToF(c.temperature_2m);
        const dewF = cToF(c.dew_point_2m);
        const windMph = kmhToMph(c.wind_speed_10m);

        let riskHTML = '';
        if (risk.level === "high") {
          riskHTML = `<div class="risk-high text-white text-center py-5 mt-5 rounded-2xl font-bold text-xl shadow-lg">
            ✅ ${risk.message}<br>
            <span class="text-lg">(${risk.type})</span><br>
            <span class="text-2xl mt-2 block">+${risk.boost} dB boost</span>
          </div>`;
        } else {
          riskHTML = `<div class="bg-emerald-900 text-emerald-300 text-center py-5 mt-5 rounded-2xl">
            → Low inversion risk (+${risk.boost} dB)
          </div>`;
        }

        document.getElementById('current').innerHTML = `
          <div class="bg-zinc-800 rounded-2xl p-6">
            <div class="text-sm text-zinc-400 mb-2">CURRENT CONDITIONS</div>
            <div class="text-6xl font-bold mb-1">${tempF}°F</div>
            <div class="grid grid-cols-2 gap-4 text-sm">
              <div>Dew Point: ${dewF}°F</div>
              <div>RH: ${c.relative_humidity_2m}%</div>
              <div>Wind: ${windMph} mph</div>
              <div>Clouds: ${c.cloud_cover}%</div>
            </div>
            ${riskHTML}
          </div>`;

        // Forecast
        let html = `<div class="text-sm text-zinc-400 mb-3">NEXT 36 HOURS — HIGH RISK PERIODS</div>`;
        let found = 0;
        const h = data.hourly;

        for (let i = 0; i < h.time.length; i++) {
          const dt = new Date(h.time[i]);
          const hour = dt.getHours();
          if (dt < now) continue;

          const fcData = {
            temperature_2m: h.temperature_2m[i],
            dew_point_2m: h.dew_point_2m[i],
            relative_humidity_2m: h.relative_humidity_2m[i],
            cloud_cover: h.cloud_cover[i],
            wind_speed_10m: h.wind_speed_10m[i]
          };

          const fcRisk = getInversionRisk(fcData, hour);

          if (fcRisk.level === "high") {
            found++;
            const timeStr = dt.toLocaleString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit' });
            const isMorning = hour <= 10;
            
            html += `<div class="bg-zinc-800 rounded-xl p-4 flex justify-between items-center ${isMorning ? 'fog-type' : ''}">
              <div>
                <span class="font-medium">${timeStr}</span><br>
                <span class="text-xs text-zinc-500">${fcRisk.type}</span>
              </div>
              <div class="text-right">
                <span class="text-amber-400">${cToF(h.temperature_2m[i])}°F</span><br>
                <span class="text-xs">${kmhToMph(h.wind_speed_10m[i])} mph</span><br>
                <span class="text-emerald-400 text-sm">+${fcRisk.boost} dB</span>
              </div>
            </div>`;
          }
        }

        if (found === 0) {
          html += `<div class="text-zinc-400 italic text-center py-12">No strong inversion periods in the next 36 hours</div>`;
        }

        document.getElementById('forecast').innerHTML = html;
        document.getElementById('status').innerHTML = '';
      } catch (e) {
        console.error(e);
        document.getElementById('status').innerHTML = '❌ Failed to load weather data';
      }
    }

    function useSelectedLocation() {
      checkWeather(selectedLat, selectedLon);
    }

    async function checkLocation() {
      const input = document.getElementById('locationInput').value.trim();
      const [lat, lon] = await getCoords(input);
      selectedLat = lat;
      selectedLon = lon;
      checkWeather(lat, lon);
    }

    // Auto-refresh every 5 minutes
    setInterval(() => checkWeather(40.6, -82.5), 300000);

    window.onload = function() {
      initMap();
      checkWeather(40.6, -82.5);
    };
  </script>
</body>
</html>
